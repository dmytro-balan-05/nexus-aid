version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexusaid
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: local
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nexusaid
      JWT_SECRET: ${JWT_SECRET:-nexusaid_local_dev_secret}
      PORT: 3000
      FRONTEND_URL: http://localhost:3001
      WFP_MERCHANT_ACCOUNT: ${WFP_MERCHANT_ACCOUNT:-local}
      WFP_SECRET_KEY: ${WFP_SECRET_KEY:-local}
      WFP_MERCHANT_DOMAIN: ${WFP_MERCHANT_DOMAIN:-localhost}
      WFP_RETURN_URL: http://localhost:3001/donations/result
      WFP_SERVICE_URL: http://localhost:3000/donations/webhook
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
        INTERNAL_API_URL: http://backend:3000
    ports:
      - "3001:3001"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  uploads: